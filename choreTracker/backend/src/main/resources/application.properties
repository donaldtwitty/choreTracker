# ================================================================
#  Morning Stars — Spring Boot Configuration
# ================================================================

server.port=${PORT:8080}

# ── DATABASE ─────────────────────────────────────────────────────
#
# LOCAL / H2 (default when no SPRING_DATASOURCE_URL is set):
#   Runs with a local file database. No setup needed.
#
# RAILWAY PRODUCTION:
#   The docker-entrypoint.sh script automatically converts
#   Railway's DATABASE_URL (postgres://...) to the JDBC format
#   Spring Boot needs (jdbc:postgresql://...) and exports it as
#   SPRING_DATASOURCE_URL before the JVM starts.
#
#   You do NOT need to manually set any variables in Railway if
#   your service has the Postgres plugin linked — the entrypoint
#   handles it automatically.
#
#   If you prefer to set them manually, add to Railway Variables:
#     SPRING_DATASOURCE_URL      = jdbc:postgresql://${{Postgres.PGHOST}}:${{Postgres.PGPORT}}/${{Postgres.PGDATABASE}}
#     SPRING_DATASOURCE_USERNAME = ${{Postgres.PGUSER}}
#     SPRING_DATASOURCE_PASSWORD = ${{Postgres.PGPASSWORD}}
#     SPRING_DATASOURCE_DRIVER_CLASS_NAME = org.postgresql.Driver
# ─────────────────────────────────────────────────────────────────

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:morningstars;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ── JPA / HIBERNATE ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Suppress H2 web console in production
spring.h2.console.enabled=false

# ── CONNECTION POOL (HikariCP) ────────────────────────────────────
#
# initialization-fail-timeout=-1 is the critical setting:
#   Default is 1 (fail immediately if no connection on startup).
#   Setting to -1 means HikariCP will keep retrying in the background
#   and NEVER block or fail app startup due to DB unavailability.
#   This lets Spring Boot bind to the HTTP port right away so the
#   healthcheck passes, even if the DB connection takes a few seconds.
#
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── LOGGING ───────────────────────────────────────────────────────
logging.level.org.springframework.boot=INFO
logging.level.com.morningstars=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=INFO

# ── ACTUATOR (healthcheck endpoint for Railway) ───────────────────
# Expose only the health endpoint — not metrics, env, beans, etc.
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Disable the database health sub-check so the endpoint returns UP
# immediately without needing a live DB connection.
management.health.db.enabled=false
management.health.diskspace.enabled=false

# ── REQUEST SIZE ──────────────────────────────────────────────────
# Allow larger state payloads (default is 1MB, family state can be larger)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB

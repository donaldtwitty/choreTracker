<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- PWA meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Morning Stars">
  <meta name="theme-color" content="#5C3D99">
  <meta name="description" content="Morning Stars — Family Chore Tracker">

  <title>Morning Stars</title>

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- App stylesheet -->
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- App mount point -->
  <div id="app"></div>

  <!-- Visual effects layer (confetti, star bursts) -->
  <div id="fx" aria-hidden="true"></div>

  <!-- Confirm modal -->
  <div id="modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-msg">
    <div class="modal-box">
      <div id="modal-icon" class="modal-icon" aria-hidden="true"></div>
      <div id="modal-msg" class="modal-msg"></div>
      <div id="modal-sub" class="modal-sub"></div>
      <div class="modal-btns">
        <button id="modal-cancel" class="modal-cancel">Cancel</button>
        <button id="modal-ok" class="modal-ok danger">Yes, do it</button>
      </div>
    </div>
  </div>

  <!-- Hidden file inputs for photo/backup uploads -->
  <input type="file" id="importInp"  accept=".json"  class="file-inp" aria-label="Restore backup file">

  <!-- JavaScript modules — order matters -->
  <script src="js/constants.js?v=8"></script>
  <script src="js/defaults.js?v=8"></script>
  <script src="js/photodb.js?v=8"></script>
  <script src="js/state.js?v=8"></script>
  <script src="js/utils.js?v=8"></script>
  <script src="js/audio.js?v=8"></script>
  <script src="js/render.js?v=8"></script>
  <script src="js/actions.js?v=8"></script>
  <script src="js/sync.js?v=8"></script>
  <script src="js/app.js?v=8"></script>

</body>
</html>
